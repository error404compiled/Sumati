<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Seeds of Wisdom — Content Manager</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Pin the config to an absolute path so it loads at /sanjuoliveteddy -->
    <link
      href="/sanjuoliveteddy/config.yml"
      type="text/yaml"
      rel="cms-config-url"
    />
    <!-- We initialise the CMS manually so we can point the GitHub login at
         this site's own OAuth endpoints, on whatever domain it is deployed to
         (Vercel, Netlify, custom domain — all work without editing this file). -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <!-- Decap CMS (formerly Netlify CMS) -->
    <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
    <script>
      // Merge a GitHub backend over the settings in config.yml. The base_url is
      // the current origin, so the login uses /api/auth + /api/callback on this
      // same deployment — no Netlify Identity or git-gateway required.
      window.CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "error404compiled/Sumati",
            branch: "main",
            base_url: window.location.origin,
            auth_endpoint: "api/auth",
          },
        },
      });
    </script>
  </body>
</html>
