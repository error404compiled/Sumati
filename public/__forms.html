<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <!--
      This hidden page lets Netlify's build-time form detection register the
      forms used across the site. The React components POST to this path.
    -->
    <form name="newsletter" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
    </form>

    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>

    <form name="comments" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="post-slug" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="comment"></textarea>
    </form>
  </body>
</html>
