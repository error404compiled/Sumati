name: CI

# Builds the site on every push and pull request to main so broken
# code never reaches Netlify. Netlify itself handles deployment via
# netlify.toml whenever this repository is connected to a Netlify site.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.18.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
